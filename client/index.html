<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="/aliasist-icon.png" />
    <link rel="apple-touch-icon" href="/aliasist-icon.png" />
    <meta name="theme-color" content="#0a1410" />
    <meta property="og:title" content="Aliasist Pulse" />
    <meta property="og:description" content="Adversarial market intelligence. Finance, rewritten with atmosphere." />
    <meta property="og:image" content="/aliasist-hero.png" />
    <title>Aliasist Pulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..900&family=Source+Serif+4:opsz,wght@8..60,300..800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
      (() => {
        const theme = localStorage.getItem("aliasist-pulse-theme");
        document.documentElement.setAttribute(
          "data-theme",
          theme === "normal" || theme === "dark" ? theme : "dark"
        );
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
