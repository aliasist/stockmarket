        fill="url(#ufo-grad-color)"
        filter="url(#glow-color)"
      />
    </g>
    <!-- "aliasist" wordmark in forest green text -->
    <text
      x="52"
      y="36"
      font-family="'Outfit', system-ui, sans-serif"
      font-size="24"
      font-weight="700"
      letter-spacing="-0.5"
