<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" fill="none">
  <defs>
    <!-- White glow filter for default white version -->
    <filter id="glow-white" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- Green gradient for color version -->
    <linearGradient id="ufo-grad-color" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#16a34a" />
    </linearGradient>
    <!-- Green glow filter for color version -->
    <filter id="glow-color" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- White version (default, visible) -->
  <g id="white-version">
