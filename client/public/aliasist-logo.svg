        fill="white"
        filter="url(#glow-white)"
        opacity="0.95"
      />
    </g>
    <!-- "aliasist" wordmark -->
    <text
      x="52"
      y="36"
      font-family="'Outfit', system-ui, sans-serif"
      font-size="24"
      font-weight="700"
      letter-spacing="-0.5"
      fill="white"
    >aliasist</text>
  </g>

