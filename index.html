<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- ── Primary Meta ─────────────────────────────────────────── -->
    <title>Aliasist Pulse — Stock Market Intelligence</title>
    <meta name="description" content="AI-powered stock market intelligence. Real-time quotes, market vectors, earnings analysis, and investment pitch builder. Part of the Aliasist suite." />
    <meta name="author" content="Aliasist" />
    <meta name="theme-color" content="#0acb9b" />
    <meta name="color-scheme" content="dark" />

    <!-- ── Open Graph (LinkedIn, Slack, iMessage previews) ──────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pulse.aliasist.com" />
    <meta property="og:title" content="Aliasist Pulse — Stock Market Intelligence" />
    <meta property="og:description" content="AI-powered stock market intelligence. Real-time quotes, market vectors, earnings analysis, and investment pitch builder." />
    <meta property="og:image" content="https://pulse.aliasist.com/aliasist-hero.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Aliasist Pulse" />

    <!-- ── Twitter / X Card ─────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://pulse.aliasist.com" />
    <meta name="twitter:title" content="Aliasist Pulse — Stock Market Intelligence" />
    <meta name="twitter:description" content="AI-powered stock market intelligence. Real-time quotes, market vectors, earnings analysis, and investment pitch builder." />
    <meta name="twitter:image" content="https://pulse.aliasist.com/aliasist-hero.png" />

    <!-- ── PWA ──────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-180x180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aliasist Pulse" />

    <!-- ── Favicon ──────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/aliasist-logo.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png" />

    <!-- ── Fonts (Space Grotesk + JetBrains Mono only) ─────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
